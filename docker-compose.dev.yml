services:
  backend:
    build: ./backend-api
    ports: ["8000:8000"]
    environment:
      - CORS_ORIGINS=http://localhost:5173
    volumes:
      - ./backend-api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports: ["5173:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
