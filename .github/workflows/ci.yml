name: CI

on:
  push:
    branches: [ "main", "development" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend-api/requirements.txt
        pip install flake8
    - name: Lint with flake8
      run: |
        flake8 backend-api --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 backend-api --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        cd backend-api
        pytest -v --cov

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    - name: Install dependencies
      run: |
        cd frontend
        # Fallback to install if ci fails
        npm install --legacy-peer-deps
    - name: Test
      run: |
        cd frontend
        npm run test --passWithNoTests || echo "No tests to run"
    - name: Build
      run: |
        cd frontend
        npm run build

  docker-build:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Backend Docker Image
      run: docker build -t monetra-backend ./backend-api
    - name: Build Frontend Docker Image
      run: docker build -t monetra-frontend ./frontend
